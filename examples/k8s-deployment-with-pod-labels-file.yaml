apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-labels
data:
  labels.txt: |
    app.kubernetes.io/name="pod-lens"
    app.kubernetes.io/instance="pod-lens-prod"
    ApplicationName="pod-lens"
    Environment="production"
    helm.sh/chart="pod-lens-1.0.0"
    team="platform"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-lens
  labels:
    app.kubernetes.io/name: pod-lens
    app.kubernetes.io/instance: pod-lens-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pod-lens
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pod-lens
        app.kubernetes.io/instance: pod-lens-prod
        ApplicationName: pod-lens
        Environment: production
    spec:
      containers:
      - name: pod-lens
        image: pod-lens:latest
        ports:
        - containerPort: 80
        env:
        - name: PORT
          value: "80"
        - name: THEME
          value: "light"
        # Option 1: Using environment variable with comma-separated format
        # - name: POD_LABELS
        #   value: "app=pod-lens,env=prod,version=1.0"
        
        # Option 2: Using downwardAPI to pass labels from ConfigMap (RECOMMENDED)
        - name: POD_LABELS_FILE
          value: /etc/pod-labels/labels.txt
        volumeMounts:
        - name: labels
          mountPath: /etc/pod-labels
      volumes:
      - name: labels
        configMap:
          name: pod-labels
---
apiVersion: v1
kind: Service
metadata:
  name: pod-lens
spec:
  selector:
    app.kubernetes.io/name: pod-lens
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
