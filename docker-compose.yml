version: '3.8'

services:
  pod-lens:
    build:
      context: .
      dockerfile: Containerfile
    container_name: pod-lens
    ports:
      - "8080:8080"
    environment:
      THEME: dark
      PORT: 8080
      POD_LABELS: "app=pod-lens,version=1.0"
    volumes:
      - ./pages:/app/pages:ro
      - ./static:/app/static:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - pod-lens-net

networks:
  pod-lens-net:
    driver: bridge
