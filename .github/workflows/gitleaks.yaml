name: Gitleaks Scan
run-name: Gitleaks Scan in [${{ github.ref_name }}] @${{ github.actor }}

on:
  push:
    branches:
      - main
      - nightly
  pull_request:
    branches:
      - main
      - nightly

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks via Docker
        run: |
          docker run --rm \
            --volume ${{ github.workspace }}:/repo \
            --workdir /repo \
            zricethezav/gitleaks:latest \
            detect \
            --verbose \
            --no-color \
            --report-format json \
            --report-path gitleaks_report.json \
            --config .gitleaks.toml

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks_report.json